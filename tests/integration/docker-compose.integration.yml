version: '3.8'

services:
  node1:
    build: ../docker
    command: ./nogo
    ports:
      - "8081:8080"
    environment:
      - NODE_PORT=8080
      - P2P_PORT=9091
      - P2P_ENABLE=true
      - P2P_SEEDS=node2:9092,node3:9093
      - STORE_MODE=pruned
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
      - ENABLE_PROTOBUF=true
    volumes:
      - node1_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/chain/info"]
      interval: 5s
      timeout: 3s
      retries: 10

  node2:
    build: ../docker
    command: ./nogo
    ports:
      - "8082:8080"
    environment:
      - NODE_PORT=8080
      - P2P_PORT=9092
      - P2P_ENABLE=true
      - P2P_SEEDS=node1:9091,node3:9093
      - STORE_MODE=pruned
      - LOG_LEVEL=info
    volumes:
      - node2_data:/data

  node3:
    build: ../docker
    command: ./nogo
    ports:
      - "8083:8080"
    environment:
      - NODE_PORT=8080
      - P2P_PORT=9093
      - P2P_ENABLE=true
      - P2P_SEEDS=node1:9091,node2:9092
      - STORE_MODE=pruned
      - LOG_LEVEL=info
    volumes:
      - node3_data:/data

volumes:
  node1_data:
  node2_data:
  node3_data:
