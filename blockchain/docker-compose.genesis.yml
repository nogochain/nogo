version: '3.8'

services:
  nogochain-genesis:
    build:
      context: .
      dockerfile: Dockerfile.genesis
    container_name: nogochain-genesis
    ports:
      - "8080:8080"
    volumes:
      - ./data:/root/data
    environment:
      - MINER_ADDRESS=NOGO006f44f4319250563c65919062932cc1cd7bae04045c355bf53bcb9d7f785c0b473fabfd7c
      - GENESIS_PATH=../genesis/mainnet.json
      - CHAIN_ID=1
      - AUTO_MINE=true
      - MINE_FORCE_EMPTY_BLOCKS=true
      - HTTP_ADDR=0.0.0.0:8080
      - ADMIN_TOKEN=your-secure-admin-token-here
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_BURST=20
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
