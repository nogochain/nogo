openapi: 3.0.3
info:
  title: NogoChain API
  description: |
    NogoChain 区块链节点的 HTTP API 接口文档
    
    ## 认证方式
    部分接口需要 Admin Token 认证，通过 `Authorization` 头传递：
    ```
    Authorization: Bearer YOUR_ADMIN_TOKEN
    ```
    
    ## 基础 URL
    - 主网：`http://main.nogochain.org:8080`
    - 本地：`http://localhost:8080`
    
    ## 响应格式
    所有接口返回 JSON 格式数据，成功响应包含 `data` 字段，错误响应包含 `error` 字段。
  version: 1.1.0
  contact:
    name: NogoChain Team
    url: https://nogochain.org
    email: dev@nogochain.org

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: http://main.nogochain.org:8080
    description: NogoChain Mainnet

tags:
  - name: System
    description: 系统相关接口（健康检查、版本信息）
  - name: Chain
    description: 区块链信息查询（链信息、区块、交易）
  - name: Transaction
    description: 交易相关操作（提交、查询）
  - name: Wallet
    description: 钱包相关操作（创建、签名）
  - name: P2P
    description: P2P 网络相关接口
  - name: Mining
    description: 挖矿相关接口
  - name: WebSocket
    description: WebSocket 实时订阅

paths:
  /health:
    get:
      tags:
        - System
      summary: 健康检查
      description: 检查节点是否正常运行
      operationId: getHealth
      responses:
        '200':
          description: 节点健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '503':
          description: 节点异常

  /version:
    get:
      tags:
        - System
      summary: 版本信息
      description: 获取节点版本和构建信息
      operationId: getVersion
      responses:
        '200':
          description: 版本信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInfo'

  /chain/info:
    get:
      tags:
        - Chain
      summary: 链信息
      description: 获取当前区块链的完整信息
      operationId: getChainInfo
      responses:
        '200':
          description: 链信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChainInfo'

  /block/height/{height}:
    get:
      tags:
        - Chain
      summary: 按高度查询区块
      description: 根据区块高度获取区块详情
      operationId: getBlockByHeight
      parameters:
        - name: height
          in: path
          required: true
          description: 区块高度，或使用 "latest" 获取最新区块
          schema:
            oneOf:
              - type: integer
                format: int64
                example: 100
              - type: string
                example: latest
      responses:
        '200':
          description: 区块详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Block'
        '404':
          description: 区块不存在

  /block/hash/{hash}:
    get:
      tags:
        - Chain
      summary: 按哈希查询区块
      description: 根据区块哈希获取区块详情
      operationId: getBlockByHash
      parameters:
        - name: hash
          in: path
          required: true
          description: 区块哈希（64 字符十六进制）
          schema:
            type: string
            format: hex
            example: bbba903f8a8c06e1f170d91aeab8eb11234a1ffa88a709d71323bfb41b31f3e2
      responses:
        '200':
          description: 区块详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Block'
        '404':
          description: 区块不存在

  /tx/{txid}:
    get:
      tags:
        - Transaction
      summary: 查询交易
      description: 根据交易 ID 获取交易详情
      operationId: getTransaction
      parameters:
        - name: txid
          in: path
          required: true
          description: 交易 ID（64 字符十六进制）
          schema:
            type: string
            format: hex
      responses:
        '200':
          description: 交易详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: 交易未找到

  /tx:
    post:
      tags:
        - Transaction
      summary: 提交交易
      description: 向网络广播已签名的交易
      operationId: submitTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rawTx:
                  type: string
                  format: hex
                  description: 已签名的交易（十六进制）
              required:
                - rawTx
      responses:
        '200':
          description: 交易提交成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  txid:
                    type: string
                    format: hex
        '400':
          description: 交易无效
        '500':
          description: 提交失败

  /balance/{address}:
    get:
      tags:
        - Chain
      summary: 查询余额
      description: 获取指定地址的 NOGO 余额
      operationId: getBalance
      parameters:
        - name: address
          in: path
          required: true
          description: NogoChain 地址
          schema:
            type: string
            example: NOGO006f44f4319250563c65919062932cc1cd7bae04045c355bf53bcb9d7f785c0b473fabfd7c
      responses:
        '200':
          description: 余额信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  address:
                    type: string
                  balance:
                    type: integer
                    format: int64
                    description: 余额（最小单位，1 NOGO = 10^8）
                  balanceNOGO:
                    type: number
                    format: double
                    description: 余额（NOGO 单位）

  /mempool:
    get:
      tags:
        - Transaction
      summary: 内存池
      description: 获取待确认交易列表
      operationId: getMempool
      responses:
        '200':
          description: 内存池交易列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  txs:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'

  /wallet/create:
    post:
      tags:
        - Wallet
      summary: 创建钱包
      description: 创建新的 HD 钱包
      operationId: createWallet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mnemonic:
                  type: string
                  description: 可选，提供助记词导入钱包
                  minLength: 1
              required:
                - mnemonic
      responses:
        '200':
          description: 钱包创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletInfo'
        '400':
          description: 参数错误

  /wallet/sign:
    post:
      tags:
        - Wallet
      summary: 签名交易
      description: 使用钱包对交易进行签名
      operationId: signTransaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  description: 发送方地址
                to:
                  type: string
                  description: 接收方地址
                amount:
                  type: integer
                  format: int64
                  description: 金额（最小单位）
                fee:
                  type: integer
                  format: int64
                  description: 手续费（最小单位）
                nonce:
                  type: integer
                  format: int64
                  description: 随机数（防重放）
              required:
                - from
                - to
                - amount
      responses:
        '200':
          description: 签名成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  rawTx:
                    type: string
                    format: hex
                    description: 已签名的交易

  /p2p/getaddr:
    get:
      tags:
        - P2P
      summary: 获取节点列表
      description: 获取已知的 P2P 节点地址列表
      operationId: getPeerAddresses
      responses:
        '200':
          description: 节点地址列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  peers:
                    type: array
                    items:
                      type: string
                      example: "223.254.144.158:9090"

  /ws:
    get:
      tags:
        - WebSocket
      summary: WebSocket 连接
      description: 建立 WebSocket 连接以订阅实时事件
      operationId: websocketConnection
      responses:
        '101':
          description: 协议切换成功，建立 WebSocket 连接

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 使用 ADMIN_TOKEN 作为 Bearer Token

  schemas:
    VersionInfo:
      type: object
      properties:
        version:
          type: string
          example: dev
        buildTime:
          type: string
          example: unknown
        goVersion:
          type: string
          example: go1.21.5

    ChainInfo:
      type: object
      properties:
        height:
          type: integer
          format: int64
          example: 105
        latestHash:
          type: string
          format: hex
        genesisHash:
          type: string
          format: hex
        difficultyBits:
          type: integer
          format: int32
          example: 11
        chainWork:
          type: string
          example: "379008"
        peersCount:
          type: integer
          example: 1
        rulesHash:
          type: string
          format: hex
          description: 共识规则哈希
        consensusParams:
          $ref: '#/components/schemas/ConsensusParams'
        monetaryPolicy:
          $ref: '#/components/schemas/MonetaryPolicy'

    ConsensusParams:
      type: object
      properties:
        difficultyTargetMs:
          type: integer
          example: 17000
        difficultyWindow:
          type: integer
          example: 10
        difficultyMinBits:
          type: integer
          example: 1
        difficultyMaxBits:
          type: integer
          example: 32
        maxBlockSize:
          type: integer
          example: 2000000
        maxTimeDrift:
          type: integer
          example: 7200

    MonetaryPolicy:
      type: object
      properties:
        initialBlockReward:
          type: integer
          format: int64
          example: 800000000
        halvingInterval:
          type: integer
          example: 0
        tailEmission:
          type: integer
          example: 0
        minerFeeShare:
          type: integer
          example: 100

    Block:
      type: object
      properties:
        height:
          type: integer
          format: int64
        hash:
          type: string
          format: hex
        prevHash:
          type: string
          format: hex
        timestamp:
          type: string
          format: date-time
        timestampUnix:
          type: integer
          format: int64
        difficultyBits:
          type: integer
          format: int32
        nonce:
          type: integer
          format: int64
        minerAddress:
          type: string
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'

    Transaction:
      type: object
      properties:
        txid:
          type: string
          format: hex
        version:
          type: integer
          format: int32
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/TxInput'
        outputs:
          type: array
          items:
            $ref: '#/components/schemas/TxOutput'
        lockTime:
          type: integer
          format: int64
        signatures:
          type: array
          items:
            type: string
            format: hex

    TxInput:
      type: object
      properties:
        prevTxID:
          type: string
          format: hex
        prevIndex:
          type: integer
        scriptSig:
          type: string
          format: hex
        sequence:
          type: integer
          format: int64

    TxOutput:
      type: object
      properties:
        value:
          type: integer
          format: int64
        scriptPubKey:
          type: string
          format: hex
        address:
          type: string

    WalletInfo:
      type: object
      properties:
        mnemonic:
          type: string
          description: 助记词（仅首次返回）
        address:
          type: string
          description: 默认地址
        derivationPath:
          type: string
          example: "m/44'/0'/0'/0/0"
