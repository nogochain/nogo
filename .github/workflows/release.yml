name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: '1.25'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}"

          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o nogo-linux-amd64 ./cmd/node
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o nogo-linux-arm64 ./cmd/node
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o nogo-darwin-amd64 ./cmd/node
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o nogo-darwin-arm64 ./cmd/node
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o nogo-windows-amd64.exe ./cmd/node

      - name: Create checksums
        run: |
          sha256sum nogo-linux-amd64 > nogo-linux-amd64.sha256
          sha256sum nogo-linux-arm64 > nogo-linux-arm64.sha256
          sha256sum nogo-darwin-amd64 > nogo-darwin-amd64.sha256
          sha256sum nogo-darwin-arm64 > nogo-darwin-arm64.sha256
          sha256sum nogo-windows-amd64.exe > nogo-windows-amd64.exe.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nogo-linux-amd64
            nogo-linux-amd64.sha256
            nogo-linux-arm64
            nogo-linux-arm64.sha256
            nogo-darwin-amd64
            nogo-darwin-amd64.sha256
            nogo-darwin-arm64
            nogo-darwin-arm64.sha256
            nogo-windows-amd64.exe
            nogo-windows-amd64.exe.sha256
          generate_release_notes: true
          draft: false
          prerelease: false

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./blockchain/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            nogochain/blockchain:latest
            nogochain/blockchain:${{ steps.get_version.outputs.VERSION }}
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
            BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
