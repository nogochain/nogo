# Custom Nginx Configuration for NogoChain Explorer
# Additional server blocks and custom settings

# Map for WebSocket detection
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Geo block for country-based access control (optional)
# Uncomment and customize as needed
# geo $blocked_country {
#     default 0;
#     # Add country codes to block
#     # CN 1;
#     # RU 1;
# }

# Rate limit zone for API endpoints
limit_req_zone $binary_remote_addr zone=api_burst:10m rate=20r/s;

# Connection tracking for DDoS protection
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
