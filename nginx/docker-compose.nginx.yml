# NogoChain Explorer - Nginx Reverse Proxy
# Usage: docker-compose -f docker-compose.nginx.yml up -d

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ${BRAND_PREFIX:-nogo}-nginx
    ports:
      - "80:80"    # HTTP - redirect to HTTPS
      - "443:443"  # HTTPS - main explorer
      - "8443:8443" # Optional - IP-based access
    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      
      # Let's Encrypt certificates
      - ./nginx/certbot/conf:/etc/letsencrypt:rw
      - ./nginx/certbot/www:/var/www/certbot:rw
      
      # SSL certificates for IP access
      - ./nginx/ssl:/etc/nginx/ssl:ro
      
      # Logs
      - ./nginx/logs:/var/log/nginx:rw
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-explorer.nogochain.org}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@nogochain.org}
    depends_on:
      - blockchain
    networks:
      - nogo-network
    restart: unless-stopped
    command: >
      sh -c "
        # Wait for blockchain to be ready
        echo 'Waiting for blockchain service...' &&
        sleep 5 &&
        
        # Test nginx configuration
        nginx -t &&
        
        # Start nginx
        echo 'Starting nginx...' &&
        nginx -g 'daemon off;'
      "

  # Blockchain node (already defined in main docker-compose.yml)
  # This is just a reference - use the main docker-compose.yml for the full setup
  blockchain:
    image: nogochain/blockchain:latest
    container_name: ${BRAND_PREFIX:-nogo}-blockchain
    expose:
      - "8080"
    networks:
      - nogo-network
    restart: unless-stopped

networks:
  nogo-network:
    driver: bridge
