<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>й’ұеҢ…й—®йўҳиҜҠж–ӯ</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .output {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { color: #3fb950; }
        .error { color: #f85149; }
        .warning { color: #d29922; }
        .info { color: #58a6ff; }
    </style>
</head>
<body>
    <h1>рҹ”Қ й’ұеҢ…й—®йўҳиҜҠж–ӯ</h1>
    <div id="output" class="output">жӯЈеңЁиҜҠж–ӯ...</div>
    
    <script>
        async function diagnose() {
            const output = document.getElementById('output');
            let log = '';
            
            try {
                log += '=== й’ұеҢ…иҜҠж–ӯжҠҘе‘Ҡ ===\n\n';
                
                // 1. жЈҖжҹҘ localStorage
                log += '1пёҸвғЈ жЈҖжҹҘ localStorage\n';
                const saved = localStorage.getItem('nogoWallet');
                
                if (!saved) {
                    log += '   вқҢ localStorage дёӯжІЎжңүй’ұеҢ…ж•°жҚ®\n';
                    log += '   рҹ’Ў иҜ·е…ҲеҲӣе»әжҲ–еҜје…Ҙй’ұеҢ…\n';
                    output.textContent = log;
                    return;
                }
                
                log += '   вң… жүҫеҲ°й’ұеҢ…ж•°жҚ®\n';
                
                // 2. и§Јжһҗй’ұеҢ…ж•°жҚ®
                log += '\n2пёҸвғЈ и§Јжһҗй’ұеҢ…ж•°жҚ®\n';
                const parsed = JSON.parse(saved);
                
                log += '   жҳҜеҗҰеҠ еҜҶпјҡ' + (parsed.encrypted ? 'вң… жҳҜ' : 'вқҢ еҗҰ') + '\n';
                
                // 3. жЈҖжҹҘеҠ еҜҶй’ұеҢ…з»“жһ„
                if (parsed.encrypted) {
                    log += '\n3пёҸвғЈ жЈҖжҹҘеҠ еҜҶй’ұеҢ…з»“жһ„\n';
                    log += '   - salt: ' + (parsed.salt ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - iv: ' + (parsed.iv ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - version: ' + (parsed.version || 'вқҢ зјәеӨұ') + '\n';
                    log += '   - encrypted: ' + (parsed.encrypted ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - address: ' + (parsed.address ? 'вң… еӯҳеңЁ (' + parsed.address + ')' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - publicKey: ' + (parsed.publicKey ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - privateKey: ' + (parsed.privateKey ? 'вҡ пёҸ жңӘеҠ еҜҶпјҒ' : 'вң… е·ІеҠ еҜҶпјҲеңЁ encrypted еӯ—ж®өдёӯпјү') + '\n';
                    
                    // 4. иҜҠж–ӯз»“жһң
                    log += '\n4пёҸвғЈ иҜҠж–ӯз»“жһң\n';
                    if (!parsed.address || !parsed.publicKey) {
                        log += '   вқҢ й—®йўҳеҸ‘зҺ°пјҡеҠ еҜҶй’ұеҢ…зјәе°‘ address жҲ– publicKey еӯ—ж®өпјҒ\n';
                        log += '   рҹ’Ў иҝҷдјҡеҜјиҮҙеҲ·ж–°йЎөйқўеҗҺж— жі•жҳҫзӨәй’ұеҢ…дҝЎжҒҜ\n';
                        log += '   рҹ’Ў йңҖиҰҒйҮҚж–°еҲӣе»әжҲ–еҜје…Ҙй’ұеҢ…\n';
                    } else {
                        log += '   вң… еҠ еҜҶй’ұеҢ…з»“жһ„жӯЈзЎ®\n';
                        log += '   рҹ’Ў address е’Ң publicKey еңЁжҳҺж–ҮдёӯпјҢеә”иҜҘеҸҜд»ҘзӣҙжҺҘжҳҫзӨә\n';
                        log += '   рҹ’Ў еҰӮжһңйЎөйқўд»Қз„¶з©әзҷҪпјҢиҜ·жЈҖжҹҘжөҸи§ҲеҷЁжҺ§еҲ¶еҸ°зҡ„ JavaScript й”ҷиҜҜ\n';
                    }
                } else {
                    log += '\n3пёҸвғЈ жЈҖжҹҘжңӘеҠ еҜҶй’ұеҢ…з»“жһ„\n';
                    log += '   - address: ' + (parsed.address ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - publicKey: ' + (parsed.publicKey ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                    log += '   - privateKey: ' + (parsed.privateKey ? 'вң… еӯҳеңЁ' : 'вқҢ зјәеӨұ') + '\n';
                }
                
                // 5. е®Ңж•ҙж•°жҚ®
                log += '\n5пёҸвғЈ е®Ңж•ҙй’ұеҢ…ж•°жҚ®\n';
                log += JSON.stringify(parsed, null, 2);
                
            } catch (e) {
                log += '\nвқҢ иҜҠж–ӯиҝҮзЁӢеҮәй”ҷпјҡ' + e.message + '\n';
                log += 'е Ҷж Ҳпјҡ' + e.stack;
            }
            
            output.textContent = log;
        }
        
        // йЎөйқўеҠ иҪҪж—¶иҮӘеҠЁиҜҠж–ӯ
        window.addEventListener('load', diagnose);
    </script>
</body>
</html>
