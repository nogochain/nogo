<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钱包测试页面</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .output {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { color: #3fb950; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <h1>🧪 钱包加载测试</h1>
    <div id="output" class="output">正在加载...</div>
    
    <script>
        window.addEventListener('load', async () => {
            const output = document.getElementById('output');
            let log = '';
            
            try {
                log += '1. 检查 localStorage...\n';
                const saved = localStorage.getItem('nogoWallet');
                
                if (!saved) {
                    log += '   ❌ 没有钱包数据\n';
                    output.textContent = log;
                    return;
                }
                
                log += '   ✅ 找到钱包数据\n\n';
                
                const parsed = JSON.parse(saved);
                log += '2. 解析钱包数据:\n';
                log += '   encrypted: ' + parsed.encrypted + '\n';
                
                if (parsed.encrypted) {
                    log += '   address: ' + (parsed.address || '❌ 缺失') + '\n';
                    log += '   publicKey: ' + (parsed.publicKey || '❌ 缺失') + '\n\n';
                    
                    if (!parsed.address || !parsed.publicKey) {
                        log += '   ❌ 这是旧的加密钱包，缺少 address 或 publicKey\n';
                        log += '   💡 请重新导入钱包\n';
                        output.textContent = log;
                        return;
                    }
                    
                    log += '3. 模拟 loadWalletInfo:\n';
                    log += '   currentWallet.address = ' + parsed.address + '\n';
                    log += '   currentWallet.publicKey = ' + parsed.publicKey + '\n\n';
                    
                    log += '4. 测试 DOM 操作:\n';
                    try {
                        const addrElement = document.getElementById('walletAddress');
                        if (addrElement) {
                            addrElement.textContent = parsed.address;
                            log += '   ✅ 成功设置 walletAddress\n';
                        } else {
                            log += '   ⚠️ walletAddress 元素不存在（这是测试页面，正常）\n';
                        }
                    } catch (e) {
                        log += '   ❌ DOM 操作失败：' + e.message + '\n';
                    }
                    
                    log += '\n5. 结论:\n';
                    log += '   ✅ 钱包数据结构正确\n';
                    log += '   ✅ 可以正常加载\n';
                    log += '   💡 如果主页面仍然空白，请检查主页面的 JavaScript 错误\n';
                    
                } else {
                    log += '   钱包未加密\n';
                }
                
            } catch (e) {
                log += '❌ 错误：' + e.message + '\n';
                log += '堆栈：' + e.stack + '\n';
            }
            
            output.textContent = log;
        });
    </script>
</body>
</html>
