<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钱包调试工具</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        h2 { color: #58a6ff; }
        .output {
            background: #0d1117;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 11px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #3fb950; }
        .error { color: #f85149; }
        .warning { color: #d29922; }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover { background: #2ea043; }
        button.danger { background: #da3633; }
        button.danger:hover { background: #f85149; }
        input {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px;
            border-radius: 4px;
            margin: 5px;
            width: 300px;
        }
        .info-box {
            background: #1f6feb26;
            border: 1px solid #1f6feb;
            border-radius: 6px;
            padding: 15px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h1>🔍 钱包调试工具</h1>
    
    <div class="info-box">
        <strong>说明：</strong> 这个工具用于诊断钱包加密和刷新页面的问题。
        <br>请按照以下步骤操作：
        <br>1. 点击 "检查 localStorage" 查看当前保存的钱包数据
        <br>2. 如果钱包已加密，检查是否有 address 和 publicKey 字段
        <br>3. 点击 "测试解密" 验证密码是否正确
        <br>4. 点击 "模拟刷新页面" 测试刷新后的行为
    </div>
    
    <div class="section">
        <h2>📦 localStorage 数据</h2>
        <button onclick="checkLocalStorage()">检查 localStorage</button>
        <button onclick="clearWallet()">清除钱包数据</button>
        <div id="storageOutput" class="output">点击按钮检查数据...</div>
    </div>
    
    <div class="section">
        <h2>🔐 解密测试</h2>
        <input type="password" id="testPassword" placeholder="输入钱包密码">
        <button onclick="testDecrypt()">测试解密</button>
        <div id="decryptOutput" class="output">输入密码后点击测试...</div>
    </div>
    
    <div class="section">
        <h2>🔄 模拟刷新页面</h2>
        <button onclick="simulatePageRefresh()">模拟刷新</button>
        <div id="refreshOutput" class="output">点击模拟刷新...</div>
    </div>
    
    <div class="section">
        <h2>📝 手动设置测试数据</h2>
        <button onclick="createTestWallet()">创建测试钱包</button>
        <div id="testOutput" class="output">点击创建测试钱包...</div>
    </div>

    <script>
        // 工具函数
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }
        
        function base64ToUint8Array(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes;
        }
        
        // 加密函数
        async function encryptWalletData(data, password) {
            const enc = new TextEncoder();
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveKey']
            );
            
            const key = await window.crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt']
            );
            
            // 只加密敏感数据（privateKey）
            const sensitiveData = {
                privateKey: data.privateKey
            };
            const encodedData = enc.encode(JSON.stringify(sensitiveData));
            const encrypted = await window.crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                encodedData
            );
            
            // 返回加密数据 + 明文地址/公钥
            return {
                encrypted: arrayBufferToBase64(encrypted),
                salt: arrayBufferToBase64(salt),
                iv: arrayBufferToBase64(iv),
                version: 1,
                address: data.address,
                publicKey: data.publicKey
            };
        }
        
        async function decryptWalletData(encryptedData, password) {
            const enc = new TextEncoder();
            const salt = base64ToUint8Array(encryptedData.salt);
            const iv = base64ToUint8Array(encryptedData.iv);
            const encrypted = base64ToUint8Array(encryptedData.encrypted);
            
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveKey']
            );
            
            const key = await window.crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
            
            const decrypted = await window.crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                encrypted
            );
            
            const dec = new TextDecoder();
            const sensitiveData = JSON.parse(dec.decode(decrypted));
            
            // 重建完整钱包数据
            const walletData = {
                address: encryptedData.address,
                publicKey: encryptedData.publicKey,
                privateKey: sensitiveData.privateKey,
                encrypted: true
            };
            
            return walletData;
        }
        
        // 检查 localStorage
        function checkLocalStorage() {
            const output = document.getElementById('storageOutput');
            try {
                const saved = localStorage.getItem('nogoWallet');
                if (!saved) {
                    output.innerHTML = '<span class="warning">⚠️ localStorage 中没有钱包数据</span>';
                    return;
                }
                
                const parsed = JSON.parse(saved);
                let html = '<span class="success">✅ 找到钱包数据</span>\n\n';
                html += '<strong>数据结构:</strong>\n';
                html += 'encrypted: ' + (parsed.encrypted ? '✅ 是' : '❌ 否') + '\n';
                
                if (parsed.encrypted) {
                    html += 'salt: ' + (parsed.salt ? '✅ 存在' : '❌ 缺失') + '\n';
                    html += 'iv: ' + (parsed.iv ? '✅ 存在' : '❌ 缺失') + '\n';
                    html += 'version: ' + (parsed.version || 'N/A') + '\n';
                    html += 'address: ' + (parsed.address || '❌ 缺失') + '\n';
                    html += 'publicKey: ' + (parsed.publicKey || '❌ 缺失') + '\n';
                    html += 'privateKey: ' + (parsed.privateKey ? '⚠️ 未加密！' : '✅ 已加密') + '\n';
                } else {
                    html += 'address: ' + (parsed.address || '❌ 缺失') + '\n';
                    html += 'publicKey: ' + (parsed.publicKey || '❌ 缺失') + '\n';
                    html += 'privateKey: ' + (parsed.privateKey ? '✅ 存在' : '❌ 缺失') + '\n';
                }
                
                html += '\n<strong>完整数据:</strong>\n' + JSON.stringify(parsed, null, 2);
                
                output.innerHTML = html;
            } catch (e) {
                output.innerHTML = '<span class="error">❌ 解析失败：' + e.message + '</span>';
            }
        }
        
        // 清除钱包数据
        function clearWallet() {
            if (confirm('确定要清除 localStorage 中的钱包数据吗？')) {
                localStorage.removeItem('nogoWallet');
                document.getElementById('storageOutput').innerHTML = '<span class="warning">✅ 已清除钱包数据</span>';
                document.getElementById('decryptOutput').innerHTML = '<span class="warning">⚠️ 数据已清除，请重新创建或导入钱包</span>';
                document.getElementById('refreshOutput').innerHTML = '<span class="warning">⚠️ 数据已清除</span>';
            }
        }
        
        // 测试解密
        async function testDecrypt() {
            const output = document.getElementById('decryptOutput');
            const password = document.getElementById('testPassword').value;
            
            if (!password) {
                output.innerHTML = '<span class="error">❌ 请输入密码</span>';
                return;
            }
            
            try {
                const saved = localStorage.getItem('nogoWallet');
                if (!saved) {
                    output.innerHTML = '<span class="warning">⚠️ localStorage 中没有钱包数据</span>';
                    return;
                }
                
                const parsed = JSON.parse(saved);
                if (!parsed.encrypted) {
                    output.innerHTML = '<span class="warning">⚠️ 钱包未加密，无需解密</span>\n\n' + JSON.stringify(parsed, null, 2);
                    return;
                }
                
                const decrypted = await decryptWalletData(parsed, password);
                
                let html = '<span class="success">✅ 解密成功！</span>\n\n';
                html += '<strong>解密后的数据:</strong>\n';
                html += 'address: ' + decrypted.address + '\n';
                html += 'publicKey: ' + decrypted.publicKey + '\n';
                html += 'privateKey: ' + decrypted.privateKey + '\n';
                html += 'encrypted: ' + decrypted.encrypted + '\n';
                
                output.innerHTML = html;
            } catch (e) {
                output.innerHTML = '<span class="error">❌ 解密失败：' + e.message + '</span>';
            }
        }
        
        // 模拟刷新页面
        async function simulatePageRefresh() {
            const output = document.getElementById('refreshOutput');
            output.innerHTML = '正在模拟刷新...';
            
            try {
                const saved = localStorage.getItem('nogoWallet');
                if (!saved) {
                    output.innerHTML = '<span class="warning">⚠️ localStorage 中没有钱包数据</span>';
                    return;
                }
                
                const parsed = JSON.parse(saved);
                
                let html = '<span class="success">✅ 模拟刷新成功</span>\n\n';
                html += '<strong>刷新后读取的数据:</strong>\n';
                
                if (parsed.encrypted) {
                    html += 'encrypted: ✅ 是\n';
                    html += 'address: ' + (parsed.address || '❌ 缺失') + '\n';
                    html += 'publicKey: ' + (parsed.publicKey || '❌ 缺失') + '\n';
                    
                    if (parsed.address && parsed.publicKey) {
                        html += '\n<span class="success">✅ 地址和公钥都在明文中，可以直接用于：</span>\n';
                        html += '  - 显示余额（需要 address）\n';
                        html += '  - 显示公钥（需要 publicKey）\n';
                        html += '  - 生成收款二维码（需要 address）\n';
                        html += '  - 查看交易记录（需要 address）\n';
                        html += '\n<span class="warning">⚠️ 发送交易需要密码解密 privateKey</span>\n';
                    } else {
                        html += '\n<span class="error">❌ 地址或公钥缺失，无法显示钱包信息！</span>\n';
                    }
                } else {
                    html += 'encrypted: ❌ 否\n';
                    html += '钱包未加密，所有字段都应该存在\n';
                }
                
                html += '\n<strong>完整数据:</strong>\n' + JSON.stringify(parsed, null, 2);
                
                output.innerHTML = html;
            } catch (e) {
                output.innerHTML = '<span class="error">❌ 模拟失败：' + e.message + '</span>';
            }
        }
        
        // 创建测试钱包
        async function createTestWallet() {
            const output = document.getElementById('testOutput');
            output.innerHTML = '正在创建测试钱包...';
            
            try {
                const testData = {
                    address: 'NOGO0056052e49ddad127d777a383e358f2d9ed909718d6a10e576b28c776ff385b010c3307baf',
                    publicKey: 'dGVzdHB1Ymxpa2V5MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=',
                    privateKey: 'dGVzdHByaXZhdGVrZXkxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMg=='
                };
                
                const password = 'test123456';
                const encrypted = await encryptWalletData(testData, password);
                
                localStorage.setItem('nogoWallet', JSON.stringify(encrypted));
                
                let html = '<span class="success">✅ 测试钱包创建成功！</span>\n\n';
                html += '<strong>密码:</strong> test123456\n\n';
                html += '<strong>保存的数据:</strong>\n' + JSON.stringify(encrypted, null, 2);
                
                output.innerHTML = html;
                
                // 自动检查
                setTimeout(() => {
                    checkLocalStorage();
                }, 100);
                
            } catch (e) {
                output.innerHTML = '<span class="error">❌ 创建失败：' + e.message + '</span>';
            }
        }
    </script>
</body>
</html>
