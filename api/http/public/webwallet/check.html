<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>钱包调试</title>
    <style>
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 20px; }
        pre { background: #161b22; padding: 15px; border-radius: 6px; white-space: pre-wrap; }
        .error { color: #f85149; }
        .success { color: #3fb950; }
        .warning { color: #d29922; }
    </style>
</head>
<body>
    <h1>钱包调试信息</h1>
    <div id="debug"></div>
    <script>
        const debug = document.getElementById('debug');
        let log = '';
        
        try {
            log += '=== 钱包调试报告 ===\n\n';
            
            // 检查 localStorage
            log += '1. localStorage 检查:\n';
            const saved = localStorage.getItem('nogoWallet');
            
            if (!saved) {
                log += '   [WARN] 没有钱包数据\n';
                log += '   建议：请先创建或导入钱包\n';
            } else {
                log += '   [OK] 找到钱包数据\n';
                
                const data = JSON.parse(saved);
                log += '\n2. 钱包数据结构:\n';
                log += '   encrypted: ' + data.encrypted + '\n';
                
                if (data.encrypted) {
                    log += '   address: ' + (data.address || '[MISSING]') + '\n';
                    log += '   publicKey: ' + (data.publicKey || '[MISSING]') + '\n';
                    log += '   salt: ' + (data.salt ? '[OK]' : '[MISSING]') + '\n';
                    log += '   iv: ' + (data.iv ? '[OK]' : '[MISSING]') + '\n';
                    log += '   version: ' + (data.version || '[MISSING]') + '\n';
                    
                    if (!data.address || !data.publicKey) {
                        log += '\n   [ERROR] 加密钱包缺少 address 或 publicKey!\n';
                        log += '   这是旧版本的加密数据，需要重新导入钱包。\n';
                    } else {
                        log += '\n   [OK] 数据结构正确\n';
                        log += '   address: ' + data.address + '\n';
                    }
                } else {
                    log += '   [INFO] 钱包未加密\n';
                    log += '   address: ' + (data.address || '[MISSING]') + '\n';
                    log += '   publicKey: ' + (data.publicKey || '[MISSING]') + '\n';
                    log += '   privateKey: ' + (data.privateKey ? '[OK]' : '[MISSING]') + '\n';
                }
                
                log += '\n3. 完整数据:\n';
                log += JSON.stringify(data, null, 2);
            }
            
        } catch (e) {
            log += '\n[ERROR] ' + e.message + '\n';
            log += e.stack;
        }
        
        debug.innerHTML = '<pre>' + log + '</pre>';
    </script>
</body>
</html>
