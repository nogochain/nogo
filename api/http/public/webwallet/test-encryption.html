<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Encryption Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        .test-section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 { color: #58a6ff; }
        h2 { color: #3fb950; font-size: 18px; }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #2ea043; }
        input, textarea {
            width: 100%;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            margin: 10px 0;
        }
        .result {
            background: #0d1117;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { border-left: 4px solid #3fb950; }
        .error { border-left: 4px solid #f85149; }
        .info { border-left: 4px solid #58a6ff; }
    </style>
</head>
<body>
    <h1>🔐 Wallet Encryption Test Tool</h1>
    
    <div class="test-section">
        <h2>1. Test Encryption</h2>
        <input type="text" id="testPassword" placeholder="Enter test password" value="TestPass123">
        <textarea id="testData" placeholder="Enter test data">{"address":"NOGO123","privateKey":"test-key","mnemonic":"test mnemonic phrase"}</textarea>
        <button onclick="testEncryption()">Encrypt Data</button>
        <div id="encryptResult" class="result info" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Test Decryption</h2>
        <input type="password" id="decryptPassword" placeholder="Enter password to decrypt">
        <button onclick="testDecryption()">Decrypt Data</button>
        <div id="decryptResult" class="result info" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Test localStorage Wallet</h2>
        <button onclick="checkLocalStorage()">Check localStorage</button>
        <button onclick="clearStorage()">Clear Storage</button>
        <div id="storageResult" class="result info" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Console Log</h2>
        <div id="consoleLog" class="result" style="height: 300px; overflow-y: auto;"></div>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
        let encryptedData = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}\n`;
            logDiv.innerHTML += logEntry;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            document.getElementById('consoleLog').innerHTML = '';
        }
        
        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }
        
        function base64ToUint8Array(base64) {
            const binary_string = window.atob(base64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes;
        }
        
        async function encryptWalletData(data, password) {
            const enc = new TextEncoder();
            const salt = window.crypto.getRandomValues(new Uint8Array(16));
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveKey']
            );
            
            const key = await window.crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt']
            );
            
            const encodedData = enc.encode(JSON.stringify(data));
            const encrypted = await window.crypto.subtle.encrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                encodedData
            );
            
            return {
                encrypted: arrayBufferToBase64(encrypted),
                salt: arrayBufferToBase64(salt),
                iv: arrayBufferToBase64(iv),
                version: 1
            };
        }
        
        async function decryptWalletData(encryptedData, password) {
            const enc = new TextEncoder();
            const salt = base64ToUint8Array(encryptedData.salt);
            const iv = base64ToUint8Array(encryptedData.iv);
            const encrypted = base64ToUint8Array(encryptedData.encrypted);
            
            const keyMaterial = await window.crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveKey']
            );
            
            const key = await window.crypto.subtle.deriveKey(
                {
                    name: 'PBKDF2',
                    salt: salt,
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['decrypt']
            );
            
            const decrypted = await window.crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: iv },
                key,
                encrypted
            );
            
            const dec = new TextDecoder();
            return JSON.parse(dec.decode(decrypted));
        }
        
        async function testEncryption() {
            try {
                const password = document.getElementById('testPassword').value;
                const data = JSON.parse(document.getElementById('testData').value);
                
                log('Starting encryption test...', 'info');
                log(`Password: ${password}`, 'info');
                log(`Data: ${JSON.stringify(data)}`, 'info');
                
                encryptedData = await encryptWalletData(data, password);
                
                log('✅ Encryption successful!', 'success');
                log(`Encrypted data structure: ${JSON.stringify(encryptedData, null, 2)}`, 'success');
                
                const resultDiv = document.getElementById('encryptResult');
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.textContent = JSON.stringify(encryptedData, null, 2);
                
                // Auto-fill decrypt password
                document.getElementById('decryptPassword').value = password;
                
            } catch (e) {
                log(`❌ Encryption failed: ${e.message}`, 'error');
                const resultDiv = document.getElementById('encryptResult');
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.textContent = `Error: ${e.message}\n${e.stack}`;
            }
        }
        
        async function testDecryption() {
            try {
                if (!encryptedData) {
                    log('❌ No encrypted data. Please encrypt first.', 'error');
                    return;
                }
                
                const password = document.getElementById('decryptPassword').value;
                
                log('Starting decryption test...', 'info');
                log(`Password: ${password}`, 'info');
                
                const decrypted = await decryptWalletData(encryptedData, password);
                
                log('✅ Decryption successful!', 'success');
                log(`Decrypted data: ${JSON.stringify(decrypted, null, 2)}`, 'success');
                
                const resultDiv = document.getElementById('decryptResult');
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.textContent = JSON.stringify(decrypted, null, 2);
                
                // Verify data matches
                const originalData = JSON.parse(document.getElementById('testData').value);
                if (JSON.stringify(decrypted) === JSON.stringify(originalData)) {
                    log('✅ Data integrity verified!', 'success');
                } else {
                    log('❌ Data mismatch!', 'error');
                }
                
            } catch (e) {
                log(`❌ Decryption failed: ${e.message}`, 'error');
                const resultDiv = document.getElementById('decryptResult');
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.textContent = `Error: ${e.message}\n${e.stack}`;
            }
        }
        
        function checkLocalStorage() {
            try {
                const wallet = localStorage.getItem('nogoWallet');
                if (!wallet) {
                    log('ℹ️ No wallet in localStorage', 'info');
                    const resultDiv = document.getElementById('storageResult');
                    resultDiv.className = 'result info';
                    resultDiv.style.display = 'block';
                    resultDiv.textContent = 'No wallet data found in localStorage';
                    return;
                }
                
                const parsed = JSON.parse(wallet);
                log('✅ Found wallet in localStorage', 'success');
                log(`Wallet structure: ${JSON.stringify(parsed, null, 2)}`, 'info');
                
                const resultDiv = document.getElementById('storageResult');
                resultDiv.className = 'result info';
                resultDiv.style.display = 'block';
                
                if (parsed.encrypted) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `Encrypted Wallet Found:\n${JSON.stringify(parsed, null, 2)}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `⚠️ Unencrypted Wallet Found:\n${JSON.stringify(parsed, null, 2)}`;
                }
                
            } catch (e) {
                log(`❌ Error reading localStorage: ${e.message}`, 'error');
                const resultDiv = document.getElementById('storageResult');
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.textContent = `Error: ${e.message}`;
            }
        }
        
        function clearStorage() {
            try {
                localStorage.removeItem('nogoWallet');
                log('✅ localStorage cleared', 'success');
                const resultDiv = document.getElementById('storageResult');
                resultDiv.className = 'result success';
                resultDiv.style.display = 'block';
                resultDiv.textContent = 'localStorage cleared successfully';
            } catch (e) {
                log(`❌ Error clearing storage: ${e.message}`, 'error');
            }
        }
        
        // Auto-check localStorage on load
        window.addEventListener('load', () => {
            log('🔐 Wallet Encryption Test Tool loaded', 'info');
            log('Checking localStorage...', 'info');
            checkLocalStorage();
        });
    </script>
</body>
</html>
