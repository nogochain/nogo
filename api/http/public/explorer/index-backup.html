<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NogoChain Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 15px 0; margin-bottom: 30px; }
.header .container { display: flex; align-items: center; gap: 20px; }
.logo { font-size: 24px; font-weight: bold; color: #58a6ff; }
.nav { display: flex; gap: 20px; }
.nav a { color: #8b949e; text-decoration: none; font-size: 14px; cursor: pointer; }
.nav a:hover { color: #c9d1d9; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
.stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.stat-label { font-size: 12px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
.stat-value { font-size: 24px; font-weight: bold; color: #58a6ff; }
.search { display: flex; gap: 10px; margin-bottom: 30px; }
.search input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; color: #c9d1d9; font-size: 14px; }
.search input:focus { outline: none; border-color: #58a6ff; }
.search button { background: #238636; border: none; border-radius: 6px; padding: 12px 24px; color: white; cursor: pointer; font-weight: bold; }
.search button:hover { background: #2ea043; }
.blocks { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
.block-header { padding: 15px 20px; border-bottom: 1px solid #30363d; font-weight: bold; color: #8b949e; font-size: 14px; }
.block-row { padding: 15px 20px; border-bottom: 1px solid #21262d; display: grid; grid-template-columns: 80px 1fr 120px 120px; gap: 15px; align-items: center; font-size: 14px; }
.block-row:last-child { border-bottom: none; }
.block-row:hover { background: #1c2128; }
.block-hash { color: #58a6ff; cursor: pointer; font-family: monospace; display: inline-flex; align-items: center; gap: 8px; }
.block-hash:hover { text-decoration: underline; }
.copy-btn { background: none; border: 1px solid #30363d; border-radius: 4px; padding: 2px 6px; cursor: pointer; color: #8b949e; font-size: 11px; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; min-width: 24px; }
.copy-btn:hover { background: #238636; border-color: #238636; color: white; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(35, 134, 54, 0.3); }
.copy-btn:active { transform: scale(0.95); }
.copy-btn.copied { background: #238636; border-color: #238636; color: white; }
.block-detail { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }
.block-detail.show { display: block; }
.detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #21262d; }
.detail-label { color: #8b949e; width: 150px; }
.detail-value { color: #c9d1d9; font-family: monospace; }
.tx-list { margin-top: 15px; }
.tx-item { background: #0d1117; border-radius: 4px; padding: 10px; margin-top: 8px; font-size: 13px; }
.tx-from, .tx-to { font-family: monospace; color: #58a6ff; }
.tx-amount { color: #3fb950; float: right; }
.footer { text-align: center; padding: 30px; color: #8b949e; font-size: 12px; margin-top: 40px; }
.error { background: #f8514966; border: 1px solid #f85149; border-radius: 6px; padding: 15px; color: #f85149; margin-bottom: 20px; display: none; }
.error.show { display: block; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #238636; color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(35, 134, 54, 0.4); opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div class="header">
  <div class="container">
    <div class="logo">NOGO</div>
    <div class="nav">
      <a href="#" onclick="showBlocks(); return false;">Blocks</a>
      <a href="#" onclick="showMempool(); return false;">Mempool</a>
      <a href="#" onclick="showPeers(); return false;">Peers</a>
    </div>
  </div>
</div>
<div class="container">
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-label">Height</div><div class="stat-value" id="height">-</div></div>
    <div class="stat"><div class="stat-label">Total Supply</div><div class="stat-value" id="supply">-</div></div>
    <div class="stat"><div class="stat-label">Difficulty</div><div class="stat-value" id="difficulty">-</div></div>
    <div class="stat"><div class="stat-label">Peers</div><div class="stat-value" id="peers">-</div></div>
  </div>
  
  <div class="error" id="error"></div>
  
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search by block height, hash, address, or TX ID...">
    <button onclick="search()">Search</button>
  </div>
  
  <div class="blocks" id="blocks">
    <div class="block-header">Recent Blocks</div>
    <div id="blockList">Loading...</div>
  </div>
  
  <div class="block-detail" id="blockDetail">
    <h3>Block Details</h3>
    <div id="blockInfo"></div>
    <div class="tx-list" id="txList"></div>
  </div>
  
  <div class="block-detail" id="addressDetail">
    <h3>Address Details</h3>
    <div id="addressInfo"></div>
  </div>
</div>

<script>
const API = window.location.protocol + '//' + window.location.hostname + ':' + (window.location.port || 8080);

async function api(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error('API error: ' + r.status);
    return await r.json();
  } catch(e) {
    showError('Cannot connect to node at ' + API + ': ' + e.message);
    return null;
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error').classList.remove('show'); }

// Copy to clipboard with toast notification
async function copyToClipboard(text, label) {
  try {
    await navigator.clipboard.writeText(text);
    
    // Update button appearance
    const btn = event.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = '✓';
    btn.classList.add('copied');
    
    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.classList.remove('copied');
    }, 1500);
    
    // Show toast notification
    showToast('✓ ' + label + ' copied!');
  } catch (err) {
    // Fallback for older browsers
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('✓ Copied!');
  }
}

// Show toast notification
function showToast(message) {
  // Remove existing toast if any
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.classList.add('show');
  }, 10);
  
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

// Convert base64 string to hex
function base64ToHex(base64) {
  if (!base64) return '-';
  const raw = atob(base64);
  return Array.from(raw).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
}

async function loadStats() {
  hideError();
  const info = await api('/chain/info');
  if (!info) return;
  
  document.getElementById('height').textContent = info.height;
  document.getElementById('supply').textContent = (info.totalSupply / 1e8).toFixed(8) + ' NOGO';
  document.getElementById('difficulty').textContent = info.difficultyBits;
  document.getElementById('peers').textContent = info.peersCount || 0;
  
  const list = document.getElementById('blockList');
  list.innerHTML = '';
  
  // Load last 20 blocks
  const startHeight = info.height;
  const endHeight = Math.max(0, startHeight - 19);
  
  for (let h = startHeight; h >= endHeight; h--) {
    const block = await api('/block/height/' + h);
    if (block) {
      const row = document.createElement('div');
      row.className = 'block-row';
      const time = block.timestampUnix ? new Date(block.timestampUnix * 1000).toLocaleTimeString() : '-';
      const txs = block.transactions ? block.transactions.length : 0;
      const hashHex = block.hash ? base64ToHex(block.hash) : '-';
      const hashShort = hashHex !== '-' ? hashHex.substring(0, 16) : '-';
      row.innerHTML = '<span>' + h + '</span><span class="block-hash" onclick="showBlock(' + h + ')">' + hashShort + '... <button class="copy-btn" onclick="event.stopPropagation(); copyToClipboard(\'' + hashHex + '\', \'Block Hash\')">📋</button></span><span>' + txs + ' tx</span><span>' + time + '</span>';
      list.appendChild(row);
    }
  }
}

async function showBlock(height) {
  const block = await api('/block/height/' + height);
  const detail = document.getElementById('blockDetail');
  const info = document.getElementById('blockInfo');
  const txList = document.getElementById('txList');
  
  if (!block) return;
  
  // Convert hash from base64 string to hex
  function base64ToHex(base64) {
    if (!base64) return '-';
    const raw = atob(base64);
    return Array.from(raw).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
  }
  
  const hashHex = block.hash ? base64ToHex(block.hash) : '-';
  const prevHashHex = block.prevHash ? base64ToHex(block.prevHash) : '-';
  const minerAddress = block.minerAddress || '-';
  
  info.innerHTML = `
    <div class="detail-row"><span class="detail-label">Height</span><span class="detail-value">${block.height}</span></div>
    <div class="detail-row"><span class="detail-label">Hash</span><span class="detail-value">${hashHex} <button class="copy-btn" onclick="copyToClipboard('${hashHex}', 'Hash')">📋</button></span></div>
    <div class="detail-row"><span class="detail-label">Timestamp</span><span class="detail-value">${block.timestampUnix ? new Date(block.timestampUnix * 1000).toLocaleString() : '-'}</span></div>
    <div class="detail-row"><span class="detail-label">Difficulty</span><span class="detail-value">${block.difficultyBits || '-'}</span></div>
    <div class="detail-row"><span class="detail-label">Nonce</span><span class="detail-value">${block.nonce || '-'}</span></div>
    <div class="detail-row"><span class="detail-label">Prev Hash</span><span class="detail-value">${prevHashHex} <button class="copy-btn" onclick="copyToClipboard('${prevHashHex}', 'Prev Hash')">📋</button></span></div>
    <div class="detail-row"><span class="detail-label">Miner</span><span class="detail-value">${minerAddress} <button class="copy-btn" onclick="copyToClipboard('${minerAddress}', 'Miner Address')">📋</button></span></div>
  `;
  
  txList.innerHTML = '<h4 style="color:#8b949e;margin:15px 0 10px">Transactions (' + (block.transactions?.length || 0) + ')</h4>';
  const txs = block.transactions || [];
  if (txs.length === 0) {
    txList.innerHTML += '<div style="color:#8b949e">No transactions</div>';
  } else {
    txs.forEach((tx, idx) => {
      const amount = (tx.amount || 0) / 1e8;
      // Use correct field names from API response
      const fromAddr = tx.fromAddr || 'COINBASE';
      const toAddr = tx.toAddress || '-';
      
      // Only show from/to for transfer transactions
      if (tx.type === 'transfer') {
        txList.innerHTML += `<div class="tx-item">
          <div><strong>Tx #${idx}</strong> <span style="color:#8b949e;font-size:11px">(${tx.type})</span></div>
          <div><span class="tx-from">${fromAddr}</span> <button class="copy-btn" onclick="copyToClipboard('${fromAddr}', 'From Address')">📋</button> → <span class="tx-to">${toAddr}</span> <button class="copy-btn" onclick="copyToClipboard('${toAddr}', 'To Address')">📋</button></div>
          <div><span class="tx-amount">${amount.toFixed(8)} NOGO</span></div>
        </div>`;
      } else {
        // Coinbase transaction
        txList.innerHTML += `<div class="tx-item">
          <div><strong>Tx #${idx}</strong> <span style="color:#238636;font-size:11px">COINBASE</span></div>
          <div><span class="tx-from">COINBASE</span> → <span class="tx-to">${toAddr}</span> <button class="copy-btn" onclick="copyToClipboard('${toAddr}', 'Miner Address')">📋</button></div>
          <div><span class="tx-amount">${amount.toFixed(8)} NOGO</span></div>
        </div>`;
      }
    });
  }
  
  detail.classList.add('show');
  detail.scrollIntoView({ behavior: 'smooth' });
}

// Show address details
function showAddressDetails(address, balance) {
  const blockDetail = document.getElementById('blockDetail');
  const addressDetail = document.getElementById('addressDetail');
  const addressInfo = document.getElementById('addressInfo');
  
  // Hide block detail if showing
  blockDetail.classList.remove('show');
  
  const balNOGO = (balance.balance || 0) / 1e8;
  const nonce = balance.nonce || 0;
  
  addressInfo.innerHTML = `
    <div class="detail-row"><span class="detail-label">Address</span><span class="detail-value">${address} <button class="copy-btn" onclick="copyToClipboard('${address}', 'Address')">📋</button></span></div>
    <div class="detail-row"><span class="detail-label">Balance</span><span class="detail-value" style="color:#3fb950;font-weight:bold">${balNOGO.toFixed(8)} NOGO</span></div>
    <div class="detail-row"><span class="detail-label">Nonce</span><span class="detail-value">${nonce}</span></div>
    <div class="detail-row"><span class="detail-label">Transactions</span><span class="detail-value">-</span></div>
  `;
  
  addressDetail.classList.add('show');
  addressDetail.scrollIntoView({ behavior: 'smooth' });
}

async function showBlocks() {
  document.getElementById('blockDetail').classList.remove('show');
  document.getElementById('addressDetail').classList.remove('show');
  document.getElementById('blocks').style.display = 'block';
  await loadStats();
}

async function showMempool() {
  document.getElementById('blockDetail').classList.remove('show');
  const mp = await api('/mempool');
  const list = document.getElementById('blockList');
  
  if (!mp) return;
  list.innerHTML = '<div class="block-header">Mempool: ' + mp.size + ' transactions</div>';
  
  (mp.txs || []).forEach(tx => {
    list.innerHTML += '<div class="block-row"><span>' + (tx.txId || '-').substring(0,16) + '</span><span>' + tx.fromAddr + '</span><span>' + tx.toAddress + '</span><span>' + ((tx.amount || 0)/1e8).toFixed(8) + ' NOGO</span></div>';
  });
}

async function showPeers() {
  document.getElementById('blockDetail').classList.remove('show');
  const info = await api('/chain/info');
  const list = document.getElementById('blockList');
  list.innerHTML = '<div class="block-header">Connected Peers</div>';
  if (info && info.peersCount > 0) {
    list.innerHTML += '<div style="padding:20px;color:#8b949e">Peer info not exposed via API</div>';
  } else {
    list.innerHTML += '<div style="padding:20px;color:#8b949e">No peers connected</div>';
  }
}

async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  hideError();
  
  // Search by block height
  if (/^\d+$/.test(q)) {
    const block = await api('/block/height/' + q);
    if (block) { showBlock(parseInt(q)); return; }
    showError('Block not found: ' + q);
    return;
  }
  
  // Search by address (NOGO prefix takes priority)
  if (q.startsWith('NOGO')) {
    const bal = await api('/balance/' + q);
    if (bal) {
      showAddressDetails(q, bal);
      return;
    }
    showError('Address not found: ' + q);
    return;
  }
  
  // Search by block hash (64-char hex string)
  if (/^[0-9a-fA-F]{64}$/.test(q)) {
    // Try block hash first
    const block = await api('/block/hash/' + q);
    if (block && block.height) { 
      showBlock(block.height); 
      return; 
    }
    
    // Try transaction ID
    const tx = await api('/tx/' + q);
    if (tx) {
      alert('Transaction found!\nID: ' + q + '\nFrom: ' + (tx.fromAddr || 'COINBASE') + '\nTo: ' + (tx.toAddress || '-') + '\nAmount: ' + ((tx.amount || 0) / 1e8).toFixed(8) + ' NOGO');
      return;
    }
    
    showError('Block or transaction not found: ' + q);
    return;
  }
  
  showError('Invalid search format: ' + q);
}

document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

loadStats();
setInterval(loadStats, 15000);
</script>
</body>
</html>
